name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: '0 */12 * * *'   # každých 12 hodin

env:
  WC_CONSUMER_KEY: ${{ secrets.WC_CONSUMER_KEY }}
  WC_CONSUMER_SECRET: ${{ secrets.WC_CONSUMER_SECRET }}
  BASE_URL: ${{ secrets.BASE_URL }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
    
      - name: Upload latest report to website
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: playwright-report/
          server-dir: /public_html/playwright-reports/